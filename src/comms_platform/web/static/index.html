<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Montage Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #d4d4d4;
      --muted: #555;
      --accent: #00d4ff;
      --green: #3ecf8e;
      --red: #f56565;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-rows: 48px 1fr;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    header .sep { color: var(--border); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .dot.connected    { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.disconnected { background: var(--red);   box-shadow: 0 0 6px var(--red);   }

    .spacer { flex: 1; }

    .stat {
      font-size: 11px;
      color: var(--muted);
    }
    .stat span { color: var(--text); }

    /* ── Main ── */
    main {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }

    .toolbar button {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 3px 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      border-radius: 3px;
      transition: border-color 0.2s, color 0.2s;
    }
    .toolbar button:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Feed ── */
    #feed {
      overflow-y: auto;
      padding: 8px 0;
    }

    #feed::-webkit-scrollbar { width: 6px; }
    #feed::-webkit-scrollbar-track { background: transparent; }
    #feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      display: grid;
      grid-template-columns: 160px 1fr auto;
      gap: 12px;
      align-items: baseline;
      padding: 5px 20px;
      border-bottom: 1px solid transparent;
      transition: background 0.1s;
      animation: fadein 0.15s ease;
    }
    .message:hover { background: var(--surface); }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-time  { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .msg-addr  { color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-params { color: var(--text); word-break: break-all; }

    /* ── Empty state ── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    #empty .icon { font-size: 28px; opacity: 0.3; }
  </style>
</head>
<body>
<div class="layout">

  <header>
    <h1>Montage Platform</h1>
    <span class="sep">|</span>
    <span class="badge">
      <span class="dot" id="dot"></span>
      <span id="conn-label">connecting</span>
    </span>
    <div class="spacer"></div>
    <div class="stat">OSC target <span id="stat-target">—</span></div>
    <div class="stat">messages <span id="stat-count">0</span></div>
    <div class="stat">clients <span id="stat-clients">—</span></div>
  </header>

  <main>
    <div class="toolbar">
      <span>OSC stream</span>
      <div class="spacer"></div>
      <button id="btn-clear">clear</button>
      <button id="btn-pause">pause</button>
    </div>

    <div id="feed">
      <div id="empty">
        <div class="icon">◎</div>
        <div>Waiting for OSC messages…</div>
      </div>
    </div>
  </main>

</div>

<script>
  const feed      = document.getElementById('feed');
  const empty     = document.getElementById('empty');
  const dot       = document.getElementById('dot');
  const connLabel = document.getElementById('conn-label');
  const statCount = document.getElementById('stat-count');
  const statClients = document.getElementById('stat-clients');

  let count   = 0;
  let paused  = false;
  const MAX_ROWS = 200;

  // ── Status polling ──────────────────────────────────────────────
  async function pollStatus() {
    try {
      const res  = await fetch('/api/status');
      const json = await res.json();
      statClients.textContent = json.sse_clients;
    } catch (_) {}
  }
  pollStatus();
  setInterval(pollStatus, 5000);

  // ── SSE ─────────────────────────────────────────────────────────
  function connect() {
    const source = new EventSource('/events');

    source.onopen = () => {
      dot.className       = 'dot connected';
      connLabel.textContent = 'connected';
    };

    source.onerror = () => {
      dot.className       = 'dot disconnected';
      connLabel.textContent = 'reconnecting…';
    };

    source.onmessage = (e) => {
      if (paused) return;

      const data = JSON.parse(e.data);
      count++;
      statCount.textContent = count;

      if (empty.parentNode === feed) feed.removeChild(empty);

      const row        = document.createElement('div');
      row.className    = 'message';

      const now        = new Date();
      const ts         = now.toTimeString().slice(0, 8) + '.' + String(now.getMilliseconds()).padStart(3, '0');
      const params     = Array.isArray(data.params) ? data.params : [data.params];
      const paramStr   = params.map(p => JSON.stringify(p)).join('  ');

      row.innerHTML = `
        <span class="msg-time">${ts}</span>
        <span class="msg-addr">${escHtml(data.address)}</span>
        <span class="msg-params">${escHtml(paramStr)}</span>
      `;

      feed.prepend(row);

      // Trim excess rows
      while (feed.children.length > MAX_ROWS) {
        feed.removeChild(feed.lastChild);
      }
    };
  }

  connect();

  // ── Controls ────────────────────────────────────────────────────
  document.getElementById('btn-clear').addEventListener('click', () => {
    feed.innerHTML = '';
    feed.appendChild(empty);
    count = 0;
    statCount.textContent = 0;
  });

  const btnPause = document.getElementById('btn-pause');
  btnPause.addEventListener('click', () => {
    paused = !paused;
    btnPause.textContent     = paused ? 'resume' : 'pause';
    btnPause.style.borderColor = paused ? 'var(--accent)' : '';
    btnPause.style.color       = paused ? 'var(--accent)' : '';
  });

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
