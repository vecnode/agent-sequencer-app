<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sequence-orchestrator</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<div class="layout">

  <header>
    <h1>sequence-orchestrator</h1>
    <span class="sep">|</span>
    <span class="badge">
      <span class="dot" id="dot"></span>
      <span id="conn-label">connecting</span>
    </span>
  </header>

  <nav class="tabs" aria-label="Main sections">
    <button class="tab active" data-tab="dashboard" id="tab-dashboard" type="button">Dashboard</button>
    <button class="tab" data-tab="incoming" id="tab-incoming" type="button">Incoming Signals</button>
  </nav>

  <main>
    <section class="tab-panel active" id="panel-dashboard" role="region" aria-labelledby="tab-dashboard">
      <section class="panel dashboard-panel">
        <div class="panel-header">Dashboard</div>
        <div class="panel-body dashboard-grid">
          <div class="dashboard-block panel-placeholder">Widget 01</div>
          <div class="dashboard-block panel-placeholder">Widget 02</div>
          <div class="dashboard-block panel-placeholder">Widget 03</div>
          <div class="dashboard-block panel-placeholder">Widget 04</div>
          <div class="dashboard-block panel-placeholder">Widget 05</div>
          <div class="dashboard-block panel-placeholder">Widget 06</div>
        </div>
      </section>
    </section>

    <section class="tab-panel" id="panel-incoming" role="region" aria-labelledby="tab-incoming">
      <section class="panel panel-stream">
        <div class="toolbar panel-header">
          <span>OSC stream</span>
          <div class="spacer"></div>
          <button id="btn-clear">clear</button>
          <button id="btn-pause">pause</button>
        </div>

        <div class="panel-subheader panel-stream-stats">
          <div class="stat">OSC IN: <span id="stat-osc-in">—</span></div>
          <div class="stat">OSC OUT: <span id="stat-osc-out">—</span></div>
          <div class="stat">messages <span id="stat-count">0</span></div>
          <div class="stat">clients <span id="stat-clients">—</span></div>
        </div>

        <div id="feed" class="panel-body">
          <div id="empty">
            <div class="icon">◎</div>
            <div>Waiting for OSC messages…</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">Placeholder 01</div>
        <div class="panel-body panel-placeholder">Reserved panel</div>
      </section>

      <section class="panel">
        <div class="panel-header">Placeholder 02</div>
        <div class="panel-body panel-placeholder">Reserved panel</div>
      </section>
    </section>
  </main>

</div>

<script>
  const feed      = document.getElementById('feed');
  const empty     = document.getElementById('empty');
  const dot       = document.getElementById('dot');
  const connLabel = document.getElementById('conn-label');
  const statCount = document.getElementById('stat-count');
  const statOscIn = document.getElementById('stat-osc-in');
  const statOscOut = document.getElementById('stat-osc-out');
  const statClients = document.getElementById('stat-clients');
  const tabs = document.querySelectorAll('.tab');
  const tabPanels = {
    dashboard: document.getElementById('panel-dashboard'),
    incoming: document.getElementById('panel-incoming'),
  };

  let count   = 0;
  let paused  = false;
  const MAX_ROWS = 200;

  function setActiveTab(tabName) {
    tabs.forEach((tab) => {
      tab.classList.toggle('active', tab.dataset.tab === tabName);
    });
    Object.entries(tabPanels).forEach(([key, panel]) => {
      panel.classList.toggle('active', key === tabName);
    });
  }

  tabs.forEach((tab) => {
    tab.addEventListener('click', () => {
      setActiveTab(tab.dataset.tab);
    });
  });

  // ── Status polling ──────────────────────────────────────────────
  async function pollStatus() {
    try {
      const res  = await fetch('/api/status');
      const json = await res.json();
      statClients.textContent = json.sse_clients;
      statOscIn.textContent = json.osc_input;
      statOscOut.textContent = json.osc_output;
    } catch (_) {}
  }
  pollStatus();
  setInterval(pollStatus, 5000);

  // ── SSE ─────────────────────────────────────────────────────────
  function connect() {
    const source = new EventSource('/events');

    source.onopen = () => {
      dot.className       = 'dot connected';
      connLabel.textContent = 'connected';
    };

    source.onerror = () => {
      dot.className       = 'dot disconnected';
      connLabel.textContent = 'reconnecting…';
    };

    source.onmessage = (e) => {
      if (paused) return;

      const data = JSON.parse(e.data);
      count++;
      statCount.textContent = count;

      if (empty.parentNode === feed) feed.removeChild(empty);

      const row        = document.createElement('div');
      row.className    = 'message';

      const now        = new Date();
      const ts         = now.toTimeString().slice(0, 8) + '.' + String(now.getMilliseconds()).padStart(3, '0');
      const params     = Array.isArray(data.params) ? data.params : [data.params];
      const paramStr   = params.map(p => JSON.stringify(p)).join('  ');
      const protocol   = data.protocol || 'stream';
      const direction  = data.direction || 'inbound';
      const source     = data.source || 'unknown';

      row.innerHTML = `
        <span class="msg-time">${ts}</span>
        <span class="msg-addr">[${escHtml(direction)}/${escHtml(protocol)}] ${escHtml(data.address)}</span>
        <span class="msg-params">${escHtml(paramStr)}</span>
        <span class="msg-meta">${escHtml(source)}</span>
      `;

      feed.prepend(row);

      // Trim excess rows
      while (feed.children.length > MAX_ROWS) {
        feed.removeChild(feed.lastChild);
      }
    };
  }

  connect();

  // ── Controls ────────────────────────────────────────────────────
  document.getElementById('btn-clear').addEventListener('click', () => {
    feed.innerHTML = '';
    feed.appendChild(empty);
    count = 0;
    statCount.textContent = 0;
  });

  const btnPause = document.getElementById('btn-pause');
  btnPause.addEventListener('click', () => {
    paused = !paused;
    btnPause.textContent     = paused ? 'resume' : 'pause';
    btnPause.style.borderColor = paused ? 'var(--accent)' : '';
    btnPause.style.color       = paused ? 'var(--accent)' : '';
  });

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
