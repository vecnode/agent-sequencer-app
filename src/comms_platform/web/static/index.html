<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Montage Platform</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<div class="layout">

  <header>
    <h1>Montage Platform</h1>
    <span class="sep">|</span>
    <span class="badge">
      <span class="dot" id="dot"></span>
      <span id="conn-label">connecting</span>
    </span>
    <div class="spacer"></div>
    <div class="stat">OSC target <span id="stat-target">—</span></div>
    <div class="stat">messages <span id="stat-count">0</span></div>
    <div class="stat">clients <span id="stat-clients">—</span></div>
  </header>

  <main>
    <div class="toolbar">
      <span>OSC stream</span>
      <div class="spacer"></div>
      <button id="btn-clear">clear</button>
      <button id="btn-pause">pause</button>
    </div>

    <div id="feed">
      <div id="empty">
        <div class="icon">◎</div>
        <div>Waiting for OSC messages…</div>
      </div>
    </div>
  </main>

</div>

<script>
  const feed      = document.getElementById('feed');
  const empty     = document.getElementById('empty');
  const dot       = document.getElementById('dot');
  const connLabel = document.getElementById('conn-label');
  const statCount = document.getElementById('stat-count');
  const statTarget = document.getElementById('stat-target');
  const statClients = document.getElementById('stat-clients');

  let count   = 0;
  let paused  = false;
  const MAX_ROWS = 200;

  // ── Status polling ──────────────────────────────────────────────
  async function pollStatus() {
    try {
      const res  = await fetch('/api/status');
      const json = await res.json();
      statClients.textContent = json.sse_clients;
      statTarget.textContent = json.osc_output;
    } catch (_) {}
  }
  pollStatus();
  setInterval(pollStatus, 5000);

  // ── SSE ─────────────────────────────────────────────────────────
  function connect() {
    const source = new EventSource('/events');

    source.onopen = () => {
      dot.className       = 'dot connected';
      connLabel.textContent = 'connected';
    };

    source.onerror = () => {
      dot.className       = 'dot disconnected';
      connLabel.textContent = 'reconnecting…';
    };

    source.onmessage = (e) => {
      if (paused) return;

      const data = JSON.parse(e.data);
      count++;
      statCount.textContent = count;

      if (empty.parentNode === feed) feed.removeChild(empty);

      const row        = document.createElement('div');
      row.className    = 'message';

      const now        = new Date();
      const ts         = now.toTimeString().slice(0, 8) + '.' + String(now.getMilliseconds()).padStart(3, '0');
      const params     = Array.isArray(data.params) ? data.params : [data.params];
      const paramStr   = params.map(p => JSON.stringify(p)).join('  ');
      const protocol   = data.protocol || 'stream';
      const direction  = data.direction || 'inbound';
      const source     = data.source || 'unknown';

      row.innerHTML = `
        <span class="msg-time">${ts}</span>
        <span class="msg-addr">[${escHtml(direction)}/${escHtml(protocol)}] ${escHtml(data.address)}</span>
        <span class="msg-params">${escHtml(paramStr)}</span>
        <span class="msg-meta">${escHtml(source)}</span>
      `;

      feed.prepend(row);

      // Trim excess rows
      while (feed.children.length > MAX_ROWS) {
        feed.removeChild(feed.lastChild);
      }
    };
  }

  connect();

  // ── Controls ────────────────────────────────────────────────────
  document.getElementById('btn-clear').addEventListener('click', () => {
    feed.innerHTML = '';
    feed.appendChild(empty);
    count = 0;
    statCount.textContent = 0;
  });

  const btnPause = document.getElementById('btn-pause');
  btnPause.addEventListener('click', () => {
    paused = !paused;
    btnPause.textContent     = paused ? 'resume' : 'pause';
    btnPause.style.borderColor = paused ? 'var(--accent)' : '';
    btnPause.style.color       = paused ? 'var(--accent)' : '';
  });

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
